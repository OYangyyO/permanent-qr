<!DOCTYPE html>
<html lang="zh">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
  <meta http-equiv="Pragma" content="no-cache">
  <meta http-equiv="Expires" content="0">
  <title>正在跳转...</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      min-height: 100vh;
      display: flex; flex-direction: column;
      align-items: center; justify-content: center;
      background: linear-gradient(135deg, #0f0c29, #302b63, #24243e);
      color: #fff; font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      padding: 20px;
    }
    .spinner {
      width: 48px; height: 48px;
      border: 4px solid rgba(255,255,255,0.15);
      border-top-color: #fff;
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
      margin-bottom: 24px;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
    h1 { font-size: 18px; font-weight: 500; opacity: 0.9; margin-bottom: 8px; text-align:center; }
    p  { font-size: 13px; opacity: 0.5; text-align:center; word-break:break-all; max-width: 90vw; }
    .retry-btn {
      margin-top: 24px;
      padding: 12px 32px;
      background: rgba(255,255,255,0.15);
      border: 1px solid rgba(255,255,255,0.3);
      color: #fff;
      border-radius: 24px;
      font-size: 14px;
      cursor: pointer;
      display: none;
    }
  </style>
</head>
<body>
  <div class="spinner" id="spinner"></div>
  <h1 id="msg">正在跳转，请稍候...</h1>
  <p id="sub">即将为您跳转到目标页面</p>
  <button class="retry-btn" id="retry" onclick="location.reload()">重新加载</button>

  <script>
    let attempts = 0;
    const MAX_ATTEMPTS = 3;

    function tryRedirect() {
      attempts++;
      fetch('url.txt?t=' + Date.now() + '&r=' + Math.random(), {
        cache: 'no-store',
        headers: { 'Cache-Control': 'no-cache' }
      })
        .then(r => r.ok ? r.text() : Promise.reject('http_' + r.status))
        .then(url => {
          url = url.trim();
          if (!url || !url.startsWith('http')) throw new Error('invalid_url');
          document.getElementById('sub').textContent = url;
          setTimeout(() => location.replace(url), 200);
        })
        .catch(err => {
          if (attempts < MAX_ATTEMPTS) {
            document.getElementById('sub').textContent = '加载中...（重试 ' + attempts + '/' + MAX_ATTEMPTS + '）';
            setTimeout(tryRedirect, 1500);
          } else {
            document.getElementById('spinner').style.display = 'none';
            document.getElementById('msg').textContent = '⚠️ 服务暂时不可用';
            document.getElementById('sub').textContent = '请下拉刷新页面或稍后重试';
            document.getElementById('retry').style.display = 'inline-block';
          }
        });
    }

    tryRedirect();
  </script>
</body>
</html>
