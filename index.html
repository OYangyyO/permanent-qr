<!DOCTYPE html>
<html lang="zh">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>正在跳转...</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      min-height: 100vh;
      display: flex; flex-direction: column;
      align-items: center; justify-content: center;
      background: linear-gradient(135deg, #0f0c29, #302b63, #24243e);
      color: #fff; font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
    }
    .spinner {
      width: 48px; height: 48px;
      border: 4px solid rgba(255,255,255,0.15);
      border-top-color: #fff;
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
      margin-bottom: 24px;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
    h1 { font-size: 18px; font-weight: 500; opacity: 0.9; margin-bottom: 8px; }
    p  { font-size: 13px; opacity: 0.5; }
    .error { color: #ff6b6b; font-size: 15px; text-align: center; max-width: 280px; line-height: 1.6; }
  </style>
</head>
<body>
  <div class="spinner" id="spinner"></div>
  <h1 id="msg">正在跳转，请稍候...</h1>
  <p id="sub">即将为您跳转到目标页面</p>

  <script>
    fetch('url.txt?t=' + Date.now(), { cache: 'no-store' })
      .then(r => r.ok ? r.text() : Promise.reject())
      .then(url => {
        url = url.trim();
        if (!url) throw new Error('empty');
        document.getElementById('sub').textContent = url;
        setTimeout(() => location.replace(url), 300);
      })
      .catch(() => {
        document.getElementById('spinner').style.display = 'none';
        document.getElementById('msg').className = 'error';
        document.getElementById('msg').textContent = '服务暂未启动，请联系管理员';
        document.getElementById('sub').textContent = '';
      });
  </script>
</body>
</html>
